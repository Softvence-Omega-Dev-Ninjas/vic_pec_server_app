version: '3.8'
services:
  db:
    image: postgres:15
    container_name: vic-pec-db
    restart: always
    environment:
      POSTGRES_USER: vicpec
      POSTGRES_PASSWORD: vicpec_password
      POSTGRES_DB: vicpec_db
    ports:
      - "5438:5432"
    volumes:
      - vicpec_postgres_data:/var/lib/postgresql/data

volumes:
  vicpec_postgres_data: